<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Staff | Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/admin.css">
    <script defer src="./js/staffs.js"></script>
    <link rel="stylesheet" href="./styles/index.css">
</head>
<body>

    <div class="container">
        <h2 class="text-center mt-4">Add New Staff</h2>
        <div class="card p-4 mt-3">
            <form id="staffForm">
                <div class="mb-3">
                    <label for="staffName" class="form-label">Staff Name</label>
                    <input type="text" class="form-control" id="staffName" required>
                </div>
                <div class="mb-3">
                    <label for="staffEmail" class="form-label">Email</label>
                    <input type="email" class="form-control" id="staffEmail" required>
                </div>
                <div class="mb-3">
                    <label for="staffPassword" class="form-label">Password</label>
                    <input type="password" class="form-control" id="staffPassword" required>
                </div>
                <div class="mb-3">
                    <label for="roleSelect" class="form-label">Assign Role</label>
                    <select class="form-select" id="roleDropdown" required>
                        <option value="">Loading roles...</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-100">Register Staff</button>
                <p id="message" class="text-center mt-3"></p>
            </form>
        </div>
    </div>

    <div class="container mt-4">
        <h3 class="text-center mb-4">Staff Management</h3>
        <table class="table table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Staff ID</th>
                    <th>Staff Name</th>
                    <th>Role</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="staffTableBody">
                <!-- dynamic insertion js** -->
            </tbody>
        </table>
    </div>

    <div>
        <a href="admin_dashboard.html">Go Back</a>
    </div>
    

    <script src="./js/admScripts.js"></script>
    
</body>
</html>
