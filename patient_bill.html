<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Bills</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            margin-top: 50px;
        }
        .table {
            background-color: white;
        }
    </style>
    <link rel="stylesheet" href="./styles/index.css">
</head>
<body>
    <div class="container">
        <h2 class="text-center">Patient Bill Details</h2>
        <table class="table table-bordered mt-4">
            <thead class="table-dark">
                <tr>
                    <th>Bill ID</th>
                    <th>Service ID</th>
                    <th>Staff ID</th>
                    <th>Patient ID</th>
                    <th>Service Rate</th>
                    <th>Payment Status</th>
                    <th>Bill Confirmed</th>
                    <th>Bill Date</th>
                </tr>
            </thead>
            <tbody id="billTableBody">
                <!-- dynamic data insertion - ddi -->
            </tbody>
        </table>
        <div class="text-center mt-3">
            <a href="show_patients.html" class="btn btn-primary">Back to Patients</a>
        </div>
    </div>

    <script>
        // get p_id from url parameters/api/{id}
        const urlParams = new URLSearchParams(window.location.search);
        const p_id = urlParams.get("id");

        if (p_id) {
            fetch(`http://127.0.0.1:8000/api/bills/${p_id}`)
                .then(response => response.json())
                .then(data => {
                    console.log("Fetched Bills Data:", data);
                    displayBills(data);
                })
                .catch(error => console.error("Error fetching bill data:", error));
        } else {
            console.error("No patient ID found in URL");
        }

        function displayBills(bills) {
            let billTableBody = document.getElementById("billTableBody");
            billTableBody.innerHTML = ""; // clearrr previous data

            if (bills.length === 0) {
                billTableBody.innerHTML = "<tr><td colspan='8' class='text-center'>No bills found</td></tr>";
                return;
            }

            bills.forEach(bill => {
                let row = `
                    <tr>
                        <td>${bill.bill_id}</td>
                        <td>${bill.ser_id}</td>
                        <td>${bill.staff_id}</td>
                        <td>${bill.p_id}</td>
                        <td>${bill.ser_rate}</td>
                        <td>${bill.payment_sts ? "Paid" : "Pending"}</td>
                        <td>${bill.bill_cfm ? "Yes" : "No"}</td>
                        <td>${bill.bill_date}</td>
                    </tr>
                `;
                billTableBody.innerHTML += row;
            });
        }
    </script>
</body>
</html>
