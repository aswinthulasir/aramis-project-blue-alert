<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Poppins:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
    <title>Admin Dashboard</title>
    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }
        .table th, .table td {
            text-align: center;
            vertical-align: middle;
        }
        .badge-paid {
            background-color: #28a745 !important;
            color: white;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 8px;
        }
        .badge-unpaid {
            background-color: #dc3545 !important;
            color: white;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 8px;
        }
        body {
            background-color: #f8f9fa; 
        }
        .navbar-brand {
            font-size: 22px;
            font-weight: 600;
            color: white;
        }
        .nav-item a {
            font-size: 18px;
            font-weight: 500;
        }
        .logout-btn {
            background-color: #dc3545; 
            border: none;
        }
        .logout-btn:hover {
            background-color: #c82333;
        }
    </style>
    <link rel="stylesheet" href="./styles/index.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">Welcome Admin</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a style="color: white;" class="nav-link" href="add_staff.html">Add Staff</a>
                    </li>
                    <li class="nav-item">
                        <a style="color: white;" class="nav-link" href="admn_show_p.html">View Patients</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-danger logout-btn" href="ad01x.html">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="text-center mb-4">Today's Billing Summary</h2>

        <!-- Total Collection -->
        <div class="alert alert-success text-center" role="alert">
            <h4>Total Bills Collected: <span id="totalCollected">0.00</span></h4>
        </div>

        <!-- Pending Payments -->
        <div class="alert alert-danger text-center" role="alert">
            <h4>Total Pending Payments: <span id="totalPending">0.00</span></h4>
        </div>

        <!-- Bills -->
        <div class="table-responsive">
            <table class="table table-bordered table-striped">
                <thead class="thead-dark">
                    <tr>
                        <th>Bill ID</th>
                        <th>Service ID</th>
                        <th>Staff ID</th>
                        <th>Patient ID</th>
                        <th>Service Rate (₹)</th>
                        <th>Payment Status</th>
                        <th>Bill Date</th>
                    </tr>
                </thead>
                <tbody id="billGrid"></tbody>
            </table>
        </div>

        <h3 class="mt-3">Pending Payments</h3>
        <table class="table table-bordered">
            <thead class="table-danger">
                <tr>
                    <th>Bill ID</th>
                    <th>Patient ID</th>
                    <th>Service ID</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody id="pendingBillsTable"></tbody>
        </table>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            fetch("http://127.0.0.1:8000/bills/today")
                .then(response => response.json())
                .then(data => {
                    
                    const billGrid = document.getElementById("billGrid");
                    const totalCollectedElement = document.getElementById("totalCollected");
                    const totalPendingElement = document.getElementById("totalPending");
                    const pendingBillsTable = document.getElementById("pendingBillsTable");

                    
                    if (!billGrid || !totalCollectedElement || !totalPendingElement || !pendingBillsTable) {
                        console.error("One or more elements are missing in the HTML.");
                        return;
                    }

                    
                    billGrid.innerHTML = "";
                    pendingBillsTable.innerHTML = "";

                    
                    totalCollectedElement.innerText = `₹${(data.total_collected || 0).toFixed(2)}`;
                    totalPendingElement.innerText = `₹${(data.total_pending || 0).toFixed(2)}`;

                  
                    if (!data.bills || data.bills.length === 0) {
                        billGrid.innerHTML = `<tr><td colspan="7" class="text-center">No bills for today</td></tr>`;
                    } else {
                        
                        data.bills.forEach(bill => {
                            const paymentBadge = bill.payment_sts ? 
                                `<span class="badge badge-paid">Paid</span>` : 
                                `<span class="badge badge-unpaid">Unpaid</span>`;

                            billGrid.innerHTML += `
                                <tr>
                                    <td>${bill.bill_id}</td>
                                    <td>${bill.ser_id}</td>
                                    <td>${bill.staff_id}</td>
                                    <td>${bill.p_id}</td>
                                    <td>₹${bill.ser_rate.toFixed(2)}</td>
                                    <td>${paymentBadge}</td>
                                    <td>${new Date(bill.bill_date).toLocaleDateString()}</td>
                                </tr>
                            `;
                        });
                    }

                  
                    if (data.pending_bills && data.pending_bills.length > 0) {
                        data.pending_bills.forEach(bill => {
                            pendingBillsTable.innerHTML += `
                                <tr>
                                    <td>${bill.bill_id}</td>
                                    <td>${bill.p_id}</td>
                                    <td>${bill.ser_id}</td>
                                    <td>₹${bill.ser_rate.toFixed(2)}</td>
                                </tr>
                            `;
                        });
                    } else {
                        pendingBillsTable.innerHTML = `<tr><td colspan="4" class="text-center">No pending payments</td></tr>`;
                    }
                })
                .catch(error => console.error("Error fetching today's bills:", error));
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
